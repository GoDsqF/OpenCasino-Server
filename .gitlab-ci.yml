# =============================================================================
# openCasino_server — GitLab CI/CD pipeline
# -----------------------------------------------------------------------------
# Stages:
#   test     — Gradle unit tests; JUnit reports surfaced in the GitLab UI
#   build    — `./gradlew bootJar` → executable Spring Boot JAR exposed as artifact
#   package  — Docker image built with Kaniko (rootless, no DinD, no privileged)
#              and pushed to the GitLab Container Registry
#   verify   — JAR-level smoke test: launch the fat JAR with dummy secrets in a
#              JDK container, probe TCP/8080 with curl
#   deploy   — manual placeholder; real deploy will run via docker compose
#              once infra is ready
#
# Security posture:
#   - No `services: docker:dind` and no `privileged = true` runners.
#   - Image build runs entirely in userspace via Kaniko.
#   - Smoke test runs the JAR directly (no docker-in-docker), so any container
#     runtime is unnecessary on the runner.
#   - Single runner type, no tags needed for capability separation.
#
# Why tests are NOT executed "inside the container on the built JAR":
#   The Spring Boot bootJar contains only main classpath + runtime deps. Test
#   classes, test-scope deps (junit-platform-launcher, reactor-test, etc.) and
#   the JUnit launcher itself are missing. So unit tests need the source tree
#   + Gradle, run in a JDK image. What CAN run "against the built artifact" is
#   black-box smoke / integration testing — that is the `verify`
# =============================================================================

stages:
  - test
  - build
  - package
  - verify
  - sync
  - deploy

# Run pipelines only for merge requests (from any branch) and for the default
# branch itself. Plain pushes to feature branches without an open MR are
# skipped, and so are tag pipelines.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'

variables:
  # Gradle: no daemon (one-shot runner), worker count tuned for shared runners.
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
  # Keep Gradle home inside the project so the `cache:` directive can persist it.
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

  # Image coordinates. :latest is a moving pointer; the second tag mirrors the
  # most recent git tag at build time. Both are published only from main.
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

# -----------------------------------------------------------------------------
# Reusable bits
# -----------------------------------------------------------------------------

# Gradle dependency cache. Keyed on the wrapper version + build script so a
# version bump invalidates it cleanly.
.gradle_cache: &gradle_cache
  key:
    files:
      - gradle/wrapper/gradle-wrapper.properties
      - build.gradle.kts
  paths:
    - .gradle/caches
    - .gradle/wrapper

# Base for any job that runs Gradle. JDK 21 is mandatory (toolchain in
# build.gradle.kts: JavaLanguageVersion.of(21)).
.gradle:
  image: eclipse-temurin:21-jdk-jammy
  cache: *gradle_cache
  before_script:
    - chmod +x ./gradlew
    - ./gradlew --no-daemon --version

# -----------------------------------------------------------------------------
# Stage: test
# -----------------------------------------------------------------------------
test:
  extends: .gradle
  stage: test
  script:
    - ./gradlew --no-daemon test
  artifacts:
    when: always           # publish reports even on red builds
    reports:
      junit: build/test-results/test/**/TEST-*.xml
    paths:
      - build/reports/tests/test
    expire_in: 1 week

# ktlint (formatting) + detekt (code smells), both with frozen baselines in
# config/{ktlint,detekt}/baseline.xml. Pre-existing violations are pinned in
# the baselines so this job only fails on NEW findings. To pick up a new
# legitimate violation, regenerate the relevant baseline locally:
#   ./gradlew ktlintGenerateBaseline
#   ./gradlew detektBaseline
lint:
  extends: .gradle
  stage: test
  script:
    - ./gradlew --no-daemon ktlintCheck detekt
  artifacts:
    when: always
    paths:
      - build/reports/ktlint
      - build/reports/detekt
    expire_in: 1 week

# Apply Liquibase changelog against a real Postgres before the JAR is even
# built. Unit tests run against H2 (PostgreSQL-mode + DATABASE_TO_LOWER=TRUE)
# which silently accepts a few PG-only constructs differently; this job is the
# tripwire that fails the pipeline on PG-only DDL errors (e.g. JSONB, partial
# indexes, generated columns) before they hit prod. The smoke-test job already
# applies the changelog as part of Spring Boot startup, but it is
# `allow_failure: true` and runs after build — too late for fast feedback.
liquibase-pg:
  stage: test
  image: liquibase/liquibase:5.0
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: casino
    POSTGRES_USER: ci
    POSTGRES_PASSWORD: ci
  before_script:
    # Liquibase 5.x dropped bundled JDBC drivers from the base image. Install
    # the PG driver via Liquibase Package Manager so `update` can resolve
    # org.postgresql.Driver. `--global` drops it into /liquibase/lib/ which is
    # already on the classpath.
    - lpm add postgresql --global
  script:
    # The master changelog lives at src/main/resources/db/changelog/, and its
    # include: file: paths are relative to that root. Point --search-path so
    # Liquibase resolves them correctly.
    - >
      liquibase
      --search-path=src/main/resources
      --changelog-file=db/changelog/db.changelog-master.yaml
      --url=jdbc:postgresql://postgres:5432/casino
      --username=ci
      --password=ci
      update
    # Sanity-check that the changelog is idempotent — re-running update on an
    # already-migrated DB must be a no-op. Catches non-deterministic SQL or
    # changesets missing a runOnChange/runAlways gate.
    - >
      liquibase
      --search-path=src/main/resources
      --changelog-file=db/changelog/db.changelog-master.yaml
      --url=jdbc:postgresql://postgres:5432/casino
      --username=ci
      --password=ci
      update

# -----------------------------------------------------------------------------
# Stage: build — fat JAR
# -----------------------------------------------------------------------------
# Tests are skipped here (-x test) — they ran in the previous stage.
# `needs: [test]` enforces order while letting other branches run in parallel.
build-jar:
  extends: .gradle
  stage: build
  needs: ["test"]
  script:
    # bootJar (Spring Boot's task) — produces an executable JAR with
    # Main-Class=org.springframework.boot.loader.launch.JarLauncher and the
    # right BOOT-INF layout. Output: build/libs/openCasino_server-<ver>.jar.
    - ./gradlew --no-daemon bootJar -x test
    - ls -la build/libs/
    # Extract project version from build.gradle.kts so build-image can use it
    # as an image tag without re-running Gradle. The line in the source is
    # `version = "1.0.1"` — a simple grep+cut is enough.
    - APP_VERSION=$(grep '^version = ' build.gradle.kts | head -1 | cut -d '"' -f 2)
    - echo "APP_VERSION=$APP_VERSION" | tee app.env
  artifacts:
    name: "openCasino_server-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/libs/openCasino_server-*.jar
    # dotenv exposes APP_VERSION as a regular CI variable in dependent jobs
    reports:
      dotenv: app.env
    expire_in: 1 month

# -----------------------------------------------------------------------------
# Stage: package — Docker image (Kaniko, rootless)
# -----------------------------------------------------------------------------
# Kaniko builds OCI images entirely in userspace — no Docker daemon, no
# /var/run/docker.sock mount, no `--privileged`. The runner stays unprivileged.
#
# We let the project Dockerfile do its own internal `./gradlew bootJar` —
# that keeps the image reproducible from sources alone, without depending on
# CI-specific JAR copying.
# Create a git tag `v<APP_VERSION>` (from build.gradle.kts) on the current
# commit, if it does not exist yet. The Tags API does NOT accept CI_JOB_TOKEN
# (returns 403 regardless of protected-tag config), so this requires a
# project/group access token with `api` scope, passed in as a masked CI/CD
# variable named `RELEASE_TOKEN`.
git-tag:
  stage: package
  image: alpine:3
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
  needs:
    - job: build-jar
      artifacts: true   # APP_VERSION dotenv
  before_script:
    - apk add --no-cache curl
  script:
    - |
      [ -n "$APP_VERSION" ] || { echo "APP_VERSION missing from build-jar dotenv"; exit 1; }
      [ -n "$RELEASE_TOKEN" ] || { echo "RELEASE_TOKEN CI variable is not set"; exit 1; }
      TAG="v$APP_VERSION"
      CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
        --header "PRIVATE-TOKEN: $RELEASE_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/tags/$TAG")
      case "$CODE" in
        200) echo "Tag $TAG already exists — skipping creation" ;;
        404)
          echo "Creating tag $TAG at $CI_COMMIT_SHA"
          curl -sS --fail-with-body -X POST \
            --header "PRIVATE-TOKEN: $RELEASE_TOKEN" \
            --data-urlencode "tag_name=$TAG" \
            --data-urlencode "ref=$CI_COMMIT_SHA" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/tags" >/dev/null
          ;;
        *) echo "Unexpected HTTP $CODE while probing tag $TAG"; exit 1 ;;
      esac
      echo "RELEASE_TAG=$TAG" > release.env
  artifacts:
    reports:
      dotenv: release.env

build-image:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  # Push/merge into main only — feature branches and MR pipelines stop after
  # test/build/verify and never produce an image.
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
  needs:
    - job: test
      artifacts: false
    - job: build-jar
      artifacts: true
    - job: git-tag
      artifacts: true   # RELEASE_TAG dotenv
  before_script:
    # Kaniko reads registry creds from /kaniko/.docker/config.json.
    # Busybox base64 has no -w flag; tr -d '\n' strips the newline instead.
    - mkdir -p /kaniko/.docker
    - |
      AUTH=$(printf '%s' "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"auth":"$AUTH"}}}
      EOF
  script:
    # Tagging:
    #   :latest         — always
    #   :v<APP_VERSION> — mirrors the git tag created/confirmed by git-tag
    - DESTS="--destination $IMAGE_LATEST"
    - |
      if [ -n "$RELEASE_TAG" ]; then
        echo "Tagging image with $RELEASE_TAG"
        DESTS="$DESTS --destination $CI_REGISTRY_IMAGE:$RELEASE_TAG"
      else
        echo "RELEASE_TAG missing; publishing :latest only"
      fi
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --label "org.opencontainers.image.revision=$CI_COMMIT_SHA"
      --label "org.opencontainers.image.created=$CI_JOB_STARTED_AT"
      --label "org.opencontainers.image.url=$CI_PROJECT_URL"
      --label "org.opencontainers.image.source=$CI_PROJECT_URL"
      --snapshot-mode=redo
      $DESTS

# -----------------------------------------------------------------------------
# Stage: verify — JAR-level smoke test
# -----------------------------------------------------------------------------
# We do NOT run the built image here (that would need a docker daemon and
# privileged mode). Instead we launch the boot JAR directly inside a JDK
# container — same JVM, same code, same env-var contract — and probe TCP/8080
# with curl. Dummy secrets satisfy bean construction; nothing real (DB / OAuth)
# is contacted.
#
# What this DOES NOT cover (since we skipped `docker run`):
#   - Dockerfile USER / tini PID-1 / ENTRYPOINT
#   - File permissions inside the image
#   - JAVA_TOOL_OPTIONS as set in the image
# Those are static text in the Dockerfile; if Kaniko built the image, they're
# correctly baked in. Real image-level smoke can happen post-deploy.
#
# allow_failure: true — surface problems without blocking deploy of the image.
smoke-test:
  stage: verify
  extends: .gradle
  needs:
    - job: build-jar
      artifacts: true
  allow_failure: true
  # Real Postgres as a sidecar service. Spring Boot's Liquibase autoconfig
  # applies db/changelog/db.changelog-master.yaml on startup, so the JAR boots
  # against the actual production schema rather than a stub.
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: casino
    POSTGRES_USER: ci
    POSTGRES_PASSWORD: ci
    DATABASE_HOST: postgres
    DATABASE_PORT: "5432"
    DATABASE_USER: ci
    DATABASE_PASSWORD: ci
    DATABASE_DB: casino
    APP_AUTH_TOKENSECRET: dummy-32-char-secret-for-ci-test
    APP_AUTH_TOKENEXPIRATIONMSEC: "864000000"
    APP_OAUTH2_CLIENTID: dummy.apps.googleusercontent.com
    APP_OAUTH2_CLIENTSECRET: dummy
    APP_JWT_KEY_ID: ci-smoke
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl openssl postgresql-client && rm -rf /var/lib/apt/lists/*
    # Wait for the postgres service to accept connections — Spring's Liquibase
    # step does not retry on initial connection refused.
    - |
      ready=0
      for i in $(seq 1 30); do
        if pg_isready -h "$DATABASE_HOST" -p "$DATABASE_PORT" -U "$DATABASE_USER" -d "$DATABASE_DB" -q; then
          ready=1; break
        fi
        sleep 1
      done
      [ "$ready" = "1" ] || { echo "postgres service did not become ready in 30s"; exit 1; }
    # Phase 4 RS256 keys: JwtKeyMaterial.fromPem rejects blank PEMs, so the
    # bean graph won't build without a real keypair. Generate an ephemeral one
    # (PKCS#8 private + X.509 SubjectPublicKeyInfo public) just for this smoke run.
    - openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt-private.pem
    - openssl rsa -in jwt-private.pem -pubout -out jwt-public.pem
    - export APP_JWT_PRIVATE_KEY_PEM="$(cat jwt-private.pem)"
    - export APP_JWT_PUBLIC_KEY_PEM="$(cat jwt-public.pem)"
    - JAR=$(ls build/libs/openCasino_server-*.jar 2>/dev/null | head -1)
    - test -n "$JAR" || { echo "no boot JAR found"; ls -la build/libs/; exit 1; }
    - echo "Launching $JAR"
    - java -jar "$JAR" > smoke.log 2>&1 &
    - APP_PID=$!
    - |
      ok=0
      for i in $(seq 1 30); do
        sleep 2
        code=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/ 2>/dev/null || echo 000)
        echo "attempt $i: HTTP=$code"
        case "$code" in 2*|3*|4*) echo "alive"; ok=1; break ;; esac
      done
      kill $APP_PID 2>/dev/null || true
      wait $APP_PID 2>/dev/null || true
      if [ "$ok" != "1" ]; then
        echo "--- last 200 lines of smoke.log ---"
        tail -200 smoke.log
        exit 1
      fi
  artifacts:
    when: on_failure
    paths: [smoke.log]
    expire_in: 1 week

# -----------------------------------------------------------------------------
# Stage: sync — propagate generated artifacts to opencasino-docs
# -----------------------------------------------------------------------------
# `MessageTypes.kt` is the wire-protocol source of truth and its TypeScript
# mirror lives in opencasino-docs at api/types.ts (frontend copies that file
# verbatim). Keeping them in sync by hand has drifted at least once already
# (the AUTH_EVENT/GAME_LIST_UPDATE collision note in types.ts is stale).
#
# This job runs only on pushes to main (post-merge), regenerates the
# `MessageType` enum block via the Gradle task, splices it between
# BEGIN/END GENERATED markers in opencasino-docs/api/types.ts, and pushes the
# result back to docs's main if anything changed. MR pipelines do not run this
# job — reviewers approve server-side, sync follows merge automatically.
#
# Required CI/CD variables:
#   DOCS_PUSH_TOKEN   Project Access Token in oss/opencasino-docs with
#                     `write_repository` scope. Masked.
sync-docs:
  extends: .gradle
  stage: sync
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
  needs: ["test", "lint"]
  variables:
    DOCS_REPO_URL: gitlab.godsq.ru/oss/opencasino-docs.git
    DOCS_TYPES_PATH: api/types.ts
    GENERATED_FILE: build/generated/api/messageTypes.generated.ts
    BEGIN_MARKER: "// === BEGIN GENERATED:message-types ==="
    END_MARKER: "// === END GENERATED:message-types ==="
  before_script:
    - chmod +x ./gradlew
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - '[ -n "$DOCS_PUSH_TOKEN" ] || { echo "DOCS_PUSH_TOKEN CI variable is not set"; exit 1; }'
  script:
    - ./gradlew --no-daemon generateMessageTypesTs
    - test -s "$GENERATED_FILE"
    # Clone docs into a sibling dir to keep workspaces isolated. Token is
    # injected via the URL so plain `git push` carries it without writing to
    # any per-branch config (see the project's gitlab-push-no-upstream pattern).
    - git clone --depth=1 "https://oauth2:${DOCS_PUSH_TOKEN}@${DOCS_REPO_URL}" docs
    - cd docs
    - git config user.email "ci@opencasino"
    - git config user.name "openCasino CI"
    # Splice the generated block in-place. awk prints everything as-is, but
    # when it sees BEGIN_MARKER it emits the marker, then the generated body,
    # then suppresses output until (and including) END_MARKER, which it emits
    # itself and resumes. If markers are missing, exit non-zero so the failure
    # surfaces here, not as silent drift.
    - |
      awk -v gen="../$GENERATED_FILE" -v beg="$BEGIN_MARKER" -v end="$END_MARKER" '
        BEGIN { seen_begin = 0; seen_end = 0; skip = 0 }
        $0 == beg {
          print
          while ((getline line < gen) > 0) print line
          close(gen)
          seen_begin = 1
          skip = 1
          next
        }
        skip && $0 == end {
          print
          skip = 0
          seen_end = 1
          next
        }
        !skip { print }
        END {
          if (!seen_begin) { print "missing BEGIN marker: " beg > "/dev/stderr"; exit 2 }
          if (!seen_end)   { print "missing END marker: "   end > "/dev/stderr"; exit 3 }
        }
      ' "$DOCS_TYPES_PATH" > "$DOCS_TYPES_PATH.new"
    - mv "$DOCS_TYPES_PATH.new" "$DOCS_TYPES_PATH"
    - |
      if git diff --quiet -- "$DOCS_TYPES_PATH"; then
        echo "MessageType block is already in sync — nothing to push."
        exit 0
      fi
      echo "MessageType block changed; committing to docs main."
      git diff -- "$DOCS_TYPES_PATH"
      git add "$DOCS_TYPES_PATH"
      git commit -m "api(types): sync MessageType enum from server@${CI_COMMIT_SHORT_SHA} \
      Auto-generated from openCasino_server/src/main/kotlin/com/opencasino/server/config/MessageTypes.kt \
      Triggered by ${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA}"
      git push origin HEAD:main

# -----------------------------------------------------------------------------
# Stage: deploy — placeholder
# -----------------------------------------------------------------------------
# Real infra (target host + docker compose project) is not provisioned yet.
# When it is, replace the `script:` block with something like:
#
#   - apk add --no-cache openssh-client
#   - eval $(ssh-agent -s) && echo "$DEPLOY_SSH_KEY" | ssh-add -
#   - ssh -o StrictHostKeyChecking=accept-new $DEPLOY_USER@$DEPLOY_HOST
#       "cd /srv/opencasino && \
#        docker login $CI_REGISTRY -u $CI_DEPLOY_USER -p $CI_DEPLOY_PASSWORD && \
#        IMAGE=$IMAGE_LATEST docker compose pull && \
#        IMAGE=$IMAGE_LATEST docker compose up -d --remove-orphans"
#
# Required CI/CD variables (when wiring infra):
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY (File-type, masked)
#   CI_DEPLOY_USER, CI_DEPLOY_PASSWORD (Deploy Token with `read_registry`)
deploy:
  stage: deploy
  image: alpine:3
  needs: ["build-image"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual
  allow_failure: true
  environment:
    name: production
    url: https://opencasino.example
  # Lines are single-quoted because plain YAML scalars interpret `: ` as a
  # mapping separator — leaving `echo "Image to deploy: $IMAGE_LATEST"` as a
  # bare entry would parse to {key: value} and trip GitLab's "script must be
  # a string" validator. Single quotes keep them as plain strings.
  script:
    - 'echo "[placeholder] deploy stage not wired — infra not ready"'
    - 'echo "Image to deploy: $IMAGE_LATEST"'
    - 'echo "Target: docker compose on host TBD (see DEPLOY_HOST in commented block above)"'
