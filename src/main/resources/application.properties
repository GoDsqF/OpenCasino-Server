spring.application.name=openCasino_server

spring.devtools.livereload.enabled=false

server.port=8080

# Layered config:
#   1. classpath:/{database,auth,ssl}.properties — bundled defaults (gitignored, present in dev)
#   2. file:/config/*.properties                 — drop-in dir mounted into the container
#                                                  (/config is declared as a VOLUME in Dockerfile)
#   3. env vars                                  — still honored via ${VAR:default} placeholders
# Files imported later override earlier ones; env vars override file-resolved placeholders.
spring.config.import=optional:classpath:/database.properties,\
  optional:classpath:/auth.properties,\
  optional:classpath:/ssl.properties,\
  optional:file:/config/application.properties,\
  optional:file:/config/database.properties,\
  optional:file:/config/auth.properties,\
  optional:file:/config/ssl.properties

# R2DBC defaults — env-var placeholders, overridable by classpath:/database.properties
# or file:/config/database.properties (both imported above with higher precedence).
# Liquibase derives its JDBC DataSource from spring.r2dbc.url via LiquibaseDataSourceConfig.
spring.r2dbc.url=r2dbc:postgresql://${DATABASE_HOST:127.0.0.1}:${DATABASE_PORT:5432}/${DATABASE_DB:casino}
spring.r2dbc.username=${DATABASE_USER:postgres}
spring.r2dbc.password=${DATABASE_PASSWORD:}
spring.r2dbc.properties.lock_timeout=10s

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
